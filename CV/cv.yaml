summary: |
  Applied AI Architect with 15+ years of experience spanning cloud infrastructure, DevOps, and enterprise AI platform engineering. Currently leading the AI Platform Engineering initiative at Liquidity Capital — architecting and delivering an agent-driven platform that uses LLMs to eliminate manual infrastructure friction and accelerate engineering velocity across the organization.

  Presented a cost-savings analysis to leadership identifying ~$4,700/month in immediate waste and up to $60,000/year in additional savings, securing executive buy-in for the AI platform initiative. Built a Python-based Discovery Agent that inventoried 9,798 AWS resources across 181 resource types to power those insights. Designed and built Maestro — a multi-agent AI platform (Pydantic AI + FastAPI + AWS Bedrock Claude Sonnet on EKS) — and a Platform MCP Server exposing AWS, GitHub, Jira, and Bedrock as Claude tools, enabling agentic workflows across the engineering organization.

  Experienced in translating complex AI and infrastructure concepts for both engineering teams and executive stakeholders, designing scalable cloud-native architectures, and integrating LLM-powered agents into enterprise workflows. Background includes enterprise client-facing work across India and the UAE, with hands-on experience navigating multi-stakeholder environments at organizations including Infosys, Paytm, and Adobe.

work_experience:
  - title: Senior Platform Engineer (AI Platform Lead)
    company: Liquidity Capital
    location: Abu Dhabi, UAE
    start_date: Feb/2023
    end_date: Present
    details:
      - Led the AI Platform Engineering initiative, architecting an agent-driven infrastructure platform; presented cost-savings analysis to leadership identifying ~$4,700/month in immediate savings and up to $60,000/year in waste, securing executive sponsorship for the programme.
      - Built a Python Discovery Agent (async boto3 + STS AssumeRole) that scanned 4 AWS environments, inventoried 9,798 resources across 181 types, and produced the evidence base for infrastructure investment decisions presented to C-level stakeholders.
      - Designed and built Maestro — a multi-agent AI platform (Pydantic AI + FastAPI gateway on EKS, AWS Bedrock Claude Sonnet) — with specialized sub-agents for infrastructure intelligence, build investigation, and IaC generation; evaluated LiteLLM as an AI Gateway layer for provider-agnostic routing, per-agent cost tracking, and guardrails; defined evaluation criteria to measure agent accuracy and reliability before production rollout.
      - Built Platform MCP Server exposing AWS, GitHub, Jira, TeamCity, and Bedrock APIs as Claude tools, enabling semi-automated agentic investigation workflows; onboarded engineering teams and gathered feedback to iterate on agent behaviour.
      - Used Claude AI (Anthropic) to analyse infrastructure inventory patterns, propose L3 constructs from live AWS state, and draft production CDK code reviewed and approved by engineers — demonstrating Claude integration patterns now being adopted across the platform.
      - Engineered 22 production-ready L3 CDK constructs (Python) with hardened security baselines — encryption hardcoded, mandatory tags, instance allowlists — and 8 CDK Hardening Aspects enforcing compliance at synth time across all stacks.
      - Designed a 3-layer IaC security enforcement model — L3 constructs (structural compliance), CDK Aspects (synth-time validation), and AWS SCPs (API-level guardrails).
      - Designed Authentication & Authorization architecture for the agent platform using Amazon Cognito + OpenFGA (Zanzibar-style relationship model) with RBAC across C-level, engineer, and platform roles.
      - Architected multi-account AWS access model using IRSA and STS AssumeRole with per-agent IAM role boundaries, ensuring zero-credential exposure across the agent mesh.
      - Designed cloud-native architecture on Amazon EKS using Helm, ensuring SOC2-compliant deployments.
      - Leading evaluation and planning for CI/CD migration from TeamCity to GitHub Actions + ArgoCD for Kubernetes deployments.
