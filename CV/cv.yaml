summary: |
  AI Platform Engineer with 15+ years of experience in cloud infrastructure, DevOps, and scalable system design. Currently leading the AI Platform Engineering initiative at Liquidity Capital — building an agent-driven infrastructure platform that uses LLMs to eliminate manual infrastructure friction across the engineering organization.

  Shipped a Python-based Discovery Agent that inventoried 9,798 AWS resources across 181 resource types, surfacing ~$4,700/month in immediate savings and up to $60,000/year in identified waste. Engineered 22 production-ready L3 CDK constructs with hardened security baselines, enforced by 8 CDK Hardening Aspects and AWS SCPs. Currently designing and building Maestro — a multi-agent AI platform (Pydantic AI + FastAPI + AWS Bedrock on EKS) with specialized sub-agents for infrastructure intelligence, build investigation, and IaC generation.

  Experienced in designing cloud-native architectures on Kubernetes (EKS), building MCP servers, and integrating LLM-powered agents into enterprise engineering workflows.

