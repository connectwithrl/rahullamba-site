      - Used Claude AI (Anthropic) to analyse infrastructure inventory patterns, propose L3 constructs from live AWS state, and draft production CDK code reviewed and approved by engineers.
      - Designing and building Maestro — a multi-agent AI platform (Pydantic AI + FastAPI gateway on EKS, AWS Bedrock Claude Sonnet) with specialized sub-agents for infrastructure intelligence, build investigation, and IaC generation.
      - Built Platform MCP Server exposing AWS, GitHub, Jira, TeamCity, and Bedrock APIs as Claude tools, enabling semi-automated agentic investigation workflows for the engineering team.
      - Designed Authentication & Authorization architecture for the agent platform using Amazon Cognito + OpenFGA (Zanzibar-style relationship model) with RBAC across C-level, engineer, and platform roles.
      - Leading evaluation and planning for CI/CD migration from TeamCity to GitHub Actions + ArgoCD for Kubernetes deployments.
      - Architected multi-account AWS access model using IRSA and STS AssumeRole with per-agent IAM role boundaries, ensuring zero-credential exposure across the agent mesh.
      - Designed cloud-native architecture on Amazon EKS using Helm, ensuring SOC2-compliant deployments.
